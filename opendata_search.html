<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searchify | Nobel Prize Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #ffae00;
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; padding: 40px 20px 10px; }
        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, #00d4ff, #00ffaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 4px; margin-bottom: 10px; }
        
        /* The New Instruction Text */
        .instruction {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0.7; }
        }

        .search-container { width: 90%; max-width: 600px; margin-bottom: 30px; position: sticky; top: 20px; z-index: 100; }
        .search-box { display: flex; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50px; padding: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .search-box input { flex: 1; padding: 15px 25px; border: none; outline: none; font-size: 18px; background: transparent; color: white; }
        .search-box button { padding: 15px 30px; border: none; border-radius: 40px; background: var(--primary); color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .search-box button:hover { background: #fff; }

        .categories { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
        .chip { padding: 8px 18px; background: var(--glass); border-radius: 20px; font-size: 14px; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .chip:hover { background: var(--primary); color: #000; }

        #results { width: 90%; max-width: 800px; display: grid; gap: 20px; padding-bottom: 50px; }
        .card { background: var(--glass); border-left: 5px solid var(--primary); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); animation: fadeInUp 0.5s ease both; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .year-tag { background: var(--accent); color: black; padding: 3px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .motivation { margin-top: 15px; line-height: 1.6; color: #ccc; font-style: italic; font-size: 0.95rem; }

        .loader { display: none; width: 40px; height: 40px; border: 4px solid var(--glass); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .footer { padding: 20px; opacity: 0.4; font-size: 10px; text-align: center; width: 100%; }
    </style>
</head>
<body>

<header>
    <h1>Searchify</h1>
    <div class="instruction">Enter a year to see who won!</div>
</header>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Try 1921, Curie, or Peace..." onkeypress="if(event.key==='Enter') search()">
        <button onclick="search()"><i class="fas fa-search"></i> Search</button>
    </div>
</div>

<div class="categories">
    <div class="chip" onclick="quickSearch('physics')">Physics</div>
    <div class="chip" onclick="quickSearch('chemistry')">Chemistry</div>
    <div class="chip" onclick="quickSearch('medicine')">Medicine</div>
    <div class="chip" onclick="quickSearch('literature')">Literature</div>
    <div class="chip" onclick="quickSearch('peace')">Peace</div>
    <div class="chip" onclick="quickSearch('economics')">Economics</div>
</div>

<div class="loader" id="loader"></div>
<div id="results"></div>

<div class="footer">Powered by the Official Nobel Prize API</div>

<script>
    function quickSearch(term) {
        document.getElementById('searchInput').value = term;
        search();
    }

    async function search() {
        const query = document.getElementById("searchInput").value.trim();
        const resultsDiv = document.getElementById("results");
        const loader = document.getElementById("loader");

        if (!query) return;

        resultsDiv.innerHTML = "";
        loader.style.display = "block";

        try {
            // Check if input is a 4-digit year (e.g. 1901)
            const isYear = /^\d{4}$/.test(query);
            let apiUrl = `https://api.nobelprize.org/2.1/nobelPrizes?limit=50`;
            
            if (isYear) {
                apiUrl += `&nobelPrizeYear=${query}`;
            } else {
                apiUrl += `&text=${encodeURIComponent(query)}`;
            }

            const response = await fetch(apiUrl);
            const data = await response.json();
            loader.style.display = "none";

            if (data.nobelPrizes && data.nobelPrizes.length > 0) {
                data.nobelPrizes.forEach((prize) => {
                    const year = prize.awardYear;
                    const category = prize.category.en;

                    if (prize.laureates) {
                        prize.laureates.forEach(laureate => {
                            const name = laureate.knownName ? laureate.knownName.en : (laureate.orgName ? laureate.orgName.en : "Nobel Laureate");
                            const motivation = laureate.motivation ? laureate.motivation.en : "No motivation provided.";
                            
                            // Generate link based on year and category slug
                            const catSlug = prize.category.en.toLowerCase();
                            const link = `https://www.nobelprize.org/prizes/${catSlug}/${year}/summary/`;

                            const card = document.createElement("div");
                            card.className = "card";
                            card.innerHTML = `
                                <div class="card-header">
                                    <h3><a href="${link}" target="_blank" style="color: var(--primary); text-decoration: none;">${name}</a></h3>
                                    <span class="year-tag">${year}</span>
                                </div>
                                <div style="color: #00ffaa; font-size: 0.85rem; font-weight: bold; margin-top: 4px; text-transform: uppercase;">${category}</div>
                                <p class="motivation">"${motivation}"</p>
                            `;
                            resultsDiv.appendChild(card);
                        });
                    }
                });
            } else {
                resultsDiv.innerHTML = `<p style="text-align:center; opacity:0.6; padding-top: 20px;">❌ No records found for "${query}". Try a different year or name.</p>`;
            }
        } catch (err) {
            loader.style.display = "none";
            resultsDiv.innerHTML = `<p style="color:#ff4b2b; text-align:center;">Error connecting to the Nobel database.</p>`;
            console.error(err);
        }
    }
</script>

</body>
</html>
