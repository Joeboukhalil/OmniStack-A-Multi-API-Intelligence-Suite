<!DOCTYPE html>
<html>
<head>
    <title>SpaceSearch | Powered by NASA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; }
        header { padding: 40px; text-align: center; }
        .search-box { display: flex; gap: 10px; width: 90%; max-width: 500px; margin-bottom: 40px; }
        input { flex: 1; padding: 15px; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 15px 25px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 90%; max-width: 1200px; }
        .item { background: #111; border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #222; }
        .item:hover { transform: scale(1.03); border-color: #007bff; }
        img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 15px; }
        h3 { font-size: 16px; margin: 0 0 10px 0; color: #00d4ff; }
        p { font-size: 12px; color: #aaa; line-height: 1.4; height: 50px; overflow: hidden; }
    </style>
</head>
<body>

<header>
    <h1>SpaceSearch</h1>
    <p>Search NASA's library for "Mars", "Saturn", or "Nebula"</p>
</header>

<div class="search-box">
    <input type="text" id="userInput" placeholder="Search the cosmos..." onkeypress="if(event.key==='Enter') searchNASA()">
    <button onclick="searchNASA()">Explore</button>
</div>

<div id="gallery"></div>

<script>
async function searchNASA() {
    const q = document.getElementById('userInput').value;
    const gallery = document.getElementById('gallery');
    if(!q) return;

    gallery.innerHTML = "Searching the stars...";
    
    try {
        // TRULY PUBLIC URL - NO KEY NEEDED
        const res = await fetch(`https://images-api.nasa.gov/search?q=${encodeURIComponent(q)}&media_type=image`);
        const data = await res.json();
        
        gallery.innerHTML = "";
        const items = data.collection.items.slice(0, 12); // Top 12 results

        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'item';
            const info = item.data[0];
            const thumb = item.links[0].href;

            card.innerHTML = `
                <img src="${thumb}">
                <div class="info">
                    <h3>${info.title}</h3>
                    <p>${info.description ? info.description.substring(0, 100) : 'No description'}...</p>
                </div>
            `;
            gallery.appendChild(card);
        });
    } catch(e) {
        gallery.innerHTML = "Error fetching the cosmos.";
    }
}
</script>
</body>
</html>
