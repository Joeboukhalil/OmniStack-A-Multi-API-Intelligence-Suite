<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScan | Open Food Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #27ae60;
            --accent-orange: #f39c12;
            --bg-soft: #f9fbf9;
            --dark: #2c3e50;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: white;
            padding: 30px 0;
            text-align: center;
            border-bottom: 3px solid var(--primary-green);
        }

        h1 { margin: 0; color: var(--primary-green); font-size: 2.2rem; }
        .subtitle { font-size: 14px; opacity: 0.7; margin-top: 5px; }

        .search-container {
            margin: 40px 0;
            width: 90%;
            max-width: 600px;
            display: flex;
            background: white;
            padding: 8px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            padding: 15px 25px;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }

        button {
            padding: 12px 30px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #219150; transform: scale(1.05); }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .food-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .food-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #fff;
            padding: 10px;
        }

        .food-content { padding: 20px; flex-grow: 1; }

        .brand { font-size: 12px; color: var(--primary-green); font-weight: bold; text-transform: uppercase; }
        .product-name { font-size: 1.1rem; margin: 5px 0 15px 0; font-weight: 700; line-height: 1.3; }

        .badges { display: flex; gap: 10px; margin-bottom: 15px; }
        .badge {
            padding: 4px 12px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            color: white;
        }

        /* Color coding for Nutri-Score */
        .score-a { background: #038141; }
        .score-b { background: #85bb2f; }
        .score-c { background: #fecb02; color: #000; }
        .score-d { background: #ee8100; }
        .score-e { background: #e63e11; }

        .ingredients {
            font-size: 13px;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .loader { display: none; margin: 40px auto; color: var(--primary-green); font-size: 2.5rem; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-leaf"></i> NutriScan</h1>
    <p class="subtitle">Search 3 million+ food products worldwide</p>
</header>

<div class="search-container">
    <input type="text" id="foodInput" placeholder="Search Nutella, Hummus, Pasta..." onkeypress="if(event.key==='Enter') searchFood()">
    <button onclick="searchFood()">Analyze</button>
</div>

<i class="fas fa-spinner loader" id="loader"></i>
<div id="results"></div>

<script>
    async function searchFood() {
        const query = document.getElementById('foodInput').value.trim();
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        if (!query) return;

        resultsDiv.innerHTML = "";
        loader.style.display = "block";

        try {
            // OPEN FOOD FACTS PUBLIC SEARCH API (No Key Required)
            // Using world.openfoodfacts.org for global results
            const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=20`;

            const response = await fetch(url);
            const data = await response.json();
            
            loader.style.display = "none";

            if (data.products && data.products.length > 0) {
                data.products.forEach(product => {
                    // Only show products with names and images for a better UI
                    if (!product.product_name || !product.image_url) return;

                    const card = document.createElement('div');
                    card.className = 'food-card';

                    const nutriGrade = (product.nutrition_grades || 'unknown').toLowerCase();
                    const nutriClass = `score-${nutriGrade}`;
                    
                    card.innerHTML = `
                        <img src="${product.image_url}" class="food-img" alt="food">
                        <div class="food-content">
                            <span class="brand">${product.brands || 'Generic'}</span>
                            <h2 class="product-name">${product.product_name}</h2>
                            
                            <div class="badges">
                                <div class="badge ${nutriClass}">NUTRI-SCORE: ${nutriGrade.toUpperCase()}</div>
                                ${product.ecoscore_grade ? `<div class="badge" style="background:#444">ECO: ${product.ecoscore_grade.toUpperCase()}</div>` : ''}
                            </div>

                            <p class="ingredients">
                                <strong>Ingredients:</strong> ${product.ingredients_text || 'Information not available.'}
                            </p>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });
            } else {
                resultsDiv.innerHTML = `<p style="text-align:center; width:100%;">No products found. Check your spelling!</p>`;
            }
        } catch (err) {
            loader.style.display = "none";
            resultsDiv.innerHTML = `<p style="color:red; text-align:center; width:100%;">Connection error. Try again later.</p>`;
            console.error(err);
        }
    }
</script>

</body>
</html>
