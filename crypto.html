<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPulse | Live Market Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0e11;
            --card-bg: #181a20;
            --text-main: #eaecef;
            --text-dim: #848e9c;
            --green: #0ecb81;
            --red: #f6465d;
            --accent: #f3ba2f; /* Binance-style yellow */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 1px solid #2b2f36;
        }

        h1 { margin: 0; color: var(--accent); font-size: 1.8rem; letter-spacing: 1px; }
        .live-tag { font-size: 10px; background: var(--green); color: black; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; font-weight: bold; }

        .search-container {
            margin: 40px 0;
            width: 90%;
            max-width: 500px;
            display: flex;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: var(--card-bg);
            border: 1px solid #2b2f36;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            position: absolute;
            right: 5px;
            top: 5px;
            bottom: 5px;
            padding: 0 20px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        #marketGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .coin-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #2b2f36;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .coin-card:hover { border-color: var(--accent); transform: translateY(-3px); }

        .coin-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .coin-icon { width: 35px; height: 35px; }
        .coin-info h3 { margin: 0; font-size: 1.1rem; }
        .coin-symbol { color: var(--text-dim); text-transform: uppercase; font-size: 12px; }

        .price { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .change { font-size: 14px; font-weight: bold; }
        .up { color: var(--green); }
        .down { color: var(--red); }

        .stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid #2b2f36; display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); }

        .loader { display: none; margin: 40px auto; color: var(--accent); font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Initial trending view */
        .section-title { width: 90%; max-width: 1200px; margin-bottom: 15px; color: var(--text-dim); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <h1>CryptoPulse <span class="live-tag">LIVE</span></h1>
</header>

<div class="search-container">
    <input type="text" id="coinInput" placeholder="Search Bitcoin, Solana, Pepe..." onkeypress="if(event.key==='Enter') searchCoin()">
    <button onclick="searchCoin()">Search</button>
</div>

<div class="section-title" id="gridTitle">Top Market Movers</div>
<i class="fas fa-circle-notch loader" id="loader"></i>
<div id="marketGrid"></div>

<script>
    // Initial load: Show top 12 coins
    window.onload = () => fetchMarketData();

    async function fetchMarketData() {
        const grid = document.getElementById('marketGrid');
        const loader = document.getElementById('loader');
        loader.style.display = "block";

        try {
            // PUBLIC API: Top coins by market cap
            const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=12&page=1&sparkline=false&price_change_percentage=24h`;
            
            const res = await fetch(url);
            const data = await res.json();
            
            renderCoins(data);
        } catch (err) {
            console.error(err);
            grid.innerHTML = `<p style="color:red">Rate limit reached. Please wait a minute and refresh.</p>`;
        } finally {
            loader.style.display = "none";
        }
    }

    async function searchCoin() {
        const query = document.getElementById('coinInput').value.trim().toLowerCase();
        const grid = document.getElementById('marketGrid');
        const loader = document.getElementById('loader');
        const title = document.getElementById('gridTitle');

        if (!query) return;

        grid.innerHTML = "";
        loader.style.display = "block";
        title.innerText = `Search results for "${query}"`;

        try {
            // Step 1: Find coin ID via search
            const searchRes = await fetch(`https://api.coingecko.com/api/v3/search?query=${query}`);
            const searchData = await searchRes.json();
            
            if (searchData.coins.length > 0) {
                const coinIds = searchData.coins.slice(0, 8).map(c => c.id).join(',');
                
                // Step 2: Get full market data for those IDs
                const marketRes = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${coinIds}&order=market_cap_desc&sparkline=false&price_change_percentage=24h`);
                const marketData = await marketRes.json();
                renderCoins(marketData);
            } else {
                grid.innerHTML = `<p>No coins found for "${query}"</p>`;
            }
        } catch (err) {
            grid.innerHTML = `<p style="color:red">Error searching. Try again later.</p>`;
        } finally {
            loader.style.display = "none";
        }
    }

    function renderCoins(coins) {
        const grid = document.getElementById('marketGrid');
        grid.innerHTML = "";

        coins.forEach(coin => {
            const priceChange = coin.price_change_percentage_24h || 0;
            const changeClass = priceChange >= 0 ? 'up' : 'down';
            const arrow = priceChange >= 0 ? '▲' : '▼';

            const card = document.createElement('div');
            card.className = 'coin-card';
            card.innerHTML = `
                <div class="coin-header">
                    <img src="${coin.image}" class="coin-icon">
                    <div class="coin-info">
                        <h3>${coin.name}</h3>
                        <span class="coin-symbol">${coin.symbol}</span>
                    </div>
                </div>
                <div class="price">$${coin.current_price.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                <div class="change ${changeClass}">${arrow} ${Math.abs(priceChange).toFixed(2)}% (24h)</div>
                
                <div class="stats">
                    <span>Rank #${coin.market_cap_rank}</span>
                    <span>Cap: $${(coin.market_cap / 1e9).toFixed(2)}B</span>
                </div>
            `;
            grid.appendChild(card);
        });
    }
</script>

</body>
</html>
