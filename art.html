<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curator | Art Institute of Chicago Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-canvas: #f6f3ef; /* Elegant off-white/beige */
            --museum-black: #1a1a1a;
            --accent-red: #b50938; /* Based on AIC's own branding */
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background-color: var(--bg-canvas);
            color: var(--museum-black);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            background: var(--museum-black);
            color: white;
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { font-size: 2.2rem; margin: 0; font-weight: 900; letter-spacing: -1px; }
        .subtitle { font-family: sans-serif; font-size: 13px; opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .search-area {
            width: 90%;
            max-width: 600px;
            margin: 40px 0 30px 0;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            font-family: sans-serif;
        }

        input:focus { border-color: var(--accent-red); box-shadow: 0 0 10px rgba(181, 9, 56, 0.2); }

        button {
            padding: 12px 25px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: sans-serif;
        }

        button:hover { background: #d00a41; transform: translateY(-2px); }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .art-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.8s ease;
        }

        .art-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }

        .img-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
            background-color: #eee;
        }

        .art-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .art-card:hover .art-img { transform: scale(1.05); }

        .art-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }

        .art-title { font-size: 1.1rem; color: var(--museum-black); margin: 0 0 10px 0; font-weight: 900; line-height: 1.3; }
        
        .art-artist { font-size: 14px; color: #555; margin-bottom: 5px; font-style: italic; }
        
        .art-meta { font-family: sans-serif; font-size: 12px; color: #888; text-transform: uppercase; margin-top: auto; padding-top: 15px; border-top: 1px solid #f0f0f0; }

        .loader { display: none; margin: 50px auto; color: var(--accent-red); font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) { #gallery { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Curator</h1>
    <p class="subtitle">Art Institute of Chicago Collection</p>
</header>

<div class="search-area">
    <input type="text" id="query" placeholder="Search Impressionism, Van Gogh, Egypt..." onkeypress="if(event.key==='Enter') searchArt()">
    <button onclick="searchArt()">Search</button>
</div>

<i class="fas fa-spinner loader" id="loader"></i>
<div id="gallery"></div>

<script>
    async function searchArt() {
        const q = document.getElementById('query').value.trim();
        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');

        if (!q) {
            alert("Please enter a keyword, artist, or style!");
            return;
        }

        gallery.innerHTML = "";
        loader.style.display = "block";

        try {
            // ART INSTITUTE PUBLIC API: https://api.artic.edu/docs/
            // Step 1: Search for the terms and get IDs
            const searchUrl = `https://api.artic.edu/api/v1/artworks/search?q=${encodeURIComponent(q)}&fields=id,title,artist_display,place_of_origin,date_display,image_id&limit=15`;
            
            const response = await fetch(searchUrl, {
                method: 'GET',
                mode: 'cors'
            });

            if (!response.ok) throw new Error('Search failed');
            const data = await response.json();
            
            // Step 2: Extract the Base Image URL (AIC uses a separate config URL)
            const config = data.config;
            const iiifBaseUrl = config.iiif_url; // Root URL for all AIC images

            const results = data.data;
            loader.style.display = "none";

            if (results && results.length > 0) {
                results.forEach(item => {
                    // Step 3: Check if the artwork actually has an image available
                    if (!item.image_id) return; // Skip works without public images

                    const card = document.createElement('div');
                    card.className = 'art-card';
                    
                    // Step 4: Construct the full IIIF Image URL
                    // We request a 600px wide image for performance, full resolution is also available
                    const imgUrl = `${iiifBaseUrl}/${item.image_id}/full/600,/0/default.jpg`;
                    const fullResUrl = `${iiifBaseUrl}/${item.image_id}/full/full/0/default.jpg`;

                    card.innerHTML = `
                        <div class="img-container">
                            <a href="${fullResUrl}" target="_blank">
                                <img src="${imgUrl}" class="art-img" alt="${item.title}" loading="lazy">
                            </a>
                        </div>
                        <div class="art-content">
                            <h2 class="art-title">${item.title}</h2>
                            <p class="art-artist">by ${item.artist_display ? item.artist_display : 'Unknown Artist'}</p>
                            <div class="art-meta">
                                ${item.place_of_origin ? item.place_of_origin : 'Unknown'} • ${item.date_display ? item.date_display : 'N/A'}
                            </div>
                        </div>
                    `;
                    gallery.appendChild(card);
                });
            } else {
                gallery.innerHTML = `<p style="text-align:center; width:100%; grid-column: 1/-1; font-family: sans-serif; opacity: 0.6; padding-top: 20px;">No results found for "${q}". Try a different keyword!</p>`;
            }
        } catch (err) {
            loader.style.display = "none";
            gallery.innerHTML = `
                <div style="text-align:center; width:100%; grid-column: 1/-1; color: var(--accent-red); font-family: sans-serif; padding-top: 20px;">
                    <i class="fas fa-exclamation-triangle fa-2x"></i>
                    <p><strong>Connection error.</strong></p>
                    <p style="font-size: 13px; color: #666;">This API is key-less and HTTPS secure. If the error persists, the museum server might be under high load.</p>
                </div>`;
            console.error("Fetch Error:", err);
        }
    }
</script>

</body>
</html>
